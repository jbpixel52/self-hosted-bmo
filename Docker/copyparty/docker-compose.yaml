# Docker Compose configuration for Copyparty - File sharing service
version: '3.3'
services:
    ac:
        container_name: copyparty
        hostname: copyparty_host
        user: "99:100"
        # ports:
        #     - '3923:3923'
        volumes:
            - '/mnt/user/:/shares'
            - '/mnt/user/appdata/copyparty:/cfg'
        image: copyparty/ac
        restart: unless-stopped
        labels:
          tsdproxy.enable: "true"
          tsdproxy.name: "copyparty"
          # HTTPS on 443 -> container port 3923 (HTTP)
          tsdproxy.port.1: "443/https:3923/http"