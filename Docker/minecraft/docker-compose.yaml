# Docker Compose configuration for Minecraft - Game server

services:
  # Minecraft - Docker service
  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft
    hostname: minecraft
    ports:
      - 25567:25567
    volumes:
      - "/mnt/user/appdata/minecraft/:/data/"
    tty: true
    stdin_open: true
    environment:
      TYPE: NEOFORGE
      VERSION: "1.21.1"
      NEOFORGE_VERSION: "21.1.222"
      MAX_TICK_TIME: -1
      ENABLE_AUTOPAUSE: "TRUE"
      AUTOPAUSE_TIMEOUT_INIT: "600"
      AUTOPAUSE_TIMEOUT_EST: "400"
      # USE_MODPACK_START_SCRIPT: "FALSE"
      PVP: "TRUE"
      ALLOW_FLIGHT: "TRUE"
      EULA: "TRUE"
      DIFFICULTY: "hard"
      MAX_PLAYERS: 6
      MAX_WORLD_SIZE: 300000
      SEED: 664
      LEVEL: "New World"
      ALLOW_NETHER: "TRUE"
      TZ: "America/Los_Angeles"
      ANNOUNCE_PLAYER_ACHIEVEMENTS: "TRUE"
      ENABLE_COMMAND_BLOCK: "TRUE"
      GENERATE_STRUCTURES: "TRUE"
      VIEW_DISTANCE: 20
      OPS: user
      SPAWN_PROTECTION: 1
      MODE: survival
      MEMORY: 6G
      #JVM_XX_OPTS: -XX:+UseZGC
      MOTD: "§c§PRENDAN EL SERVER"
      SERVER_PORT: 25567
      CONSOLE: "FALSE"
      GUI: "FALSE"
      SIMULATION_DISTANCE: 6
    deploy:
      restart_policy:
        condition: on-failure
        delay: 3s
        max_attempts: 1
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 8G
