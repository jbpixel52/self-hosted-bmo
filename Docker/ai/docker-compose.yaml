# Docker Compose configuration for AI services
# Includes Ollama (LLM service) and Lobe Chat (UI frontend)

services:
    # Ollama - Local LLM inference server with GPU acceleration
    ollama:
        image: ollama/ollama
        container_name: ollama
        hostname: ollama
        networks:
          - ai
        ports:
            # Ollama API port
            - '11434:11434'
        volumes:
            # Persistent storage for Ollama models
            - '/mnt/user/appdata/ollama:/root/.ollama'
        deploy:
            resources:
                reservations:
                    # GPU resource allocation - uses all available NVIDIA GPUs
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [ gpu ]
        labels:
          tsdproxy.enable: "true"
          tsdproxy.name: "ollama"
          # HTTPS on 443 -> container port 11434 (HTTP)
          tsdproxy.port.1: "443/https:11434/http"





networks:
  ai:
    name: ai

