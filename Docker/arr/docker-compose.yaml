# Docker Compose configuration for Arr Stack - Radarr, Sonarr, Bazarr (media management)

services:
  # Radarr - Movie collection manager and downloader
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    hostname: radarr
    tty: true
    stdin_open: true
    environment:
      - PUID=99
      - PGID=100
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/user/appdata/radarr:/config
      - /mnt/user/media/:/media
      - /mnt/user/media/MOVIES/:/movies
      - /mnt/user/media_cache/downloads:/downloads/
    restart: unless-stopped
    ports:
      - 7878:7878
    networks: [arr]
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "radarr"
      # HTTPS on 443 -> container port 7878 (HTTP)
      tsdproxy.port.1: "443/https:7878/http"
  # Sonarr - TV series collection manager and downloader
  sonarr:
    container_name: sonarr
    hostname: sonarr
    image: linuxserver/sonarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/sonarr:/config
      - /mnt/user/media/SHOWS:/SHOWS
      - /mnt/user/media/ANIME:/ANIME
      - /mnt/user/media_cache/downloads:/downloads/
    environment:
      - PUID=99
      - PGID=100
      - TZ=America/Los_Angeles
    ports:
      - 8990:8989
    networks: [arr]
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "sonarr"
      # HTTPS on 443 -> container port 8990 (HTTP)
      tsdproxy.port.1: "443/https:8990/http"
  # Bazarr - Subtitle manager for Radarr and Sonarr
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    environment:
      - PUID=99
      - PGID=100
      - TZ=Etc/UTC
    volumes:
      - /mnt/user/appdata/bazarr/config:/config
      - /mnt/user/media/MOVIES/:/movies #optional
      - /mnt/user/media/SHOWS/:/tv #optional
    ports:
      - 6767:6767
    networks: [arr]
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "bazarr"
      # HTTPS on 443 -> container port 6767 (HTTP)
      tsdproxy.port.1: "443/https:6767/http"
    restart: unless-stopped

  # Prowlarr - Indexer manager for arr-stack
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr
    environment:
      - PUID=99
      - PGID=100
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/user/appdata/prowlarr:/config
    ports:
      - 9696:9696
    networks: [arr]
    restart: unless-stopped
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "prowlarr"
      # HTTPS on 443 -> container port 9696 (HTTP)
      tsdproxy.port.1: "443/https:9696/http"
  # Flaresolverr - Docker service
  flaresolverr:
    image: "ghcr.io/flaresolverr/flaresolverr:latest"
    container_name: flaresolverr
    hostname: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - PUID=99
      - PGID=100
    ports:
      - "8191:8191"
    networks: [arr]
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "flaresolverr"
      # HTTPS on 443 -> container port 8191 (HTTP)
      tsdproxy.port.1: "443/https:8191/http"
  # Lidarr - Docker service
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=99
      - PGID=100
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/user/appdata/lidarr/config:/config
      - /mnt/user/media/MUSIC:/music #optional
      - /mnt/user/media_cache/downloads:/downloads #optional
    networks: [arr]
    ports:
      - 8686:8686
    restart: unless-stopped
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "lidarr"
      # HTTPS on 443 -> container port 8686 (HTTP)
      tsdproxy.port.1: "443/https:8686/http"
  # Recyclarr - Docker service
  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    ports:
      - '6868:6868'
    volumes:
      - ./config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      # Uncomment ORIGIN if you use a reverse proxy to access your containers.
      - ORIGIN=http://profilarr.java-regulus.ts.net
      - PARSER_HOST=parser
      - PARSER_PORT=5000
    depends_on:
      parser:
        condition: service_healthy
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "profilarr"
      # HTTPS on 443 -> container port 6868 (HTTP)
      tsdproxy.port.1: "443/https:6868/http"

  # Optional - only needed for CF/QP testing
  parser:
    image: ghcr.io/dictionarry-hub/profilarr-parser:latest
    container_name: profilarr-parser
    expose:
      - '5000'
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    hostname: qbittorrent
    environment:
      - PUID=99
      - PGID=100
      - TZ=America/Los_Angeles
      - WEBUI_PORT=8888
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    volumes:
      - /mnt/user/appdata/qbittorrent/config:/config/
      # - /mnt/user/appdata/qbittorrent/downloads:/downloads
      - /mnt/user/media_cache/downloads:/downloads/
      - /mnt/user/media/:/media/
      - /mnt/user/media/MOVIES/:/movies #optional
      - /mnt/user/media/SHOWS/:/tv #optional
    ports:
      - 8888:8888
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    networks: [arr]
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "qbittorrent"
      # HTTPS on 443 -> container port 8888 (HTTP)
      tsdproxy.port.1: "443/https:8888/http"


networks:
  # Arr - Docker service
  arr:
    name: arr

